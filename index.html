<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>۷۳ ایده‌ی ماشین استخدام AI Product Builder</title>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
<style>
:root{
  --color-bg:#F8FAFC; --color-card:#FFFFFF; --color-text:#0F172A;
  --color-text-sec:#475569; --color-text-mut:#94A3B8; --color-border:#E2E8F0;
  --color-border-hv:#CBD5E1; --color-accent:#4F46E5; --color-heart:#F43F5E;
  --border-radius-lg: 16px; --border-radius-md: 10px;
}
body { margin: 0; font-family: "Vazirmatn", sans-serif; background: var(--color-bg); color: var(--color-text); line-height: 1.5; padding-bottom: 40px;}
*{box-sizing:border-box}
button, input, select { font-family: "Vazirmatn", sans-serif; outline: none; }

/* Sticky Compact Topbar */
.header-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(248, 250, 252, 0.85);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(226, 232, 240, 0.8);
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
}
.filters-left { display: flex; flex: 1; align-items: center; gap: 12px; min-width: 280px;}
.filters-right { display: flex; align-items: center; gap: 10px; }

input[type=search]{
  flex: 1; min-width: 150px; padding: 8px 14px; font-size: 13px;
  border-radius: 20px; border: 1px solid var(--color-border);
  background: var(--color-card); color: var(--color-text); transition: all .2s;
}
input[type=search]:focus{ border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);}
.form-select {
  padding: 8px 30px 8px 14px; font-size: 13px; font-weight: 500;
  border-radius: 20px; border: 1px solid var(--color-border);
  background-color: var(--color-card); color: var(--color-text-sec);
  appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill="%2394A3B8" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
  background-repeat: no-repeat; background-position: left 8px center; cursor: pointer; transition:.2s;
}
.form-select:hover { border-color: var(--color-border-hv); }

.cnt { font-size:12px; color:var(--color-text-mut); white-space:nowrap; font-weight: 600;}
.fav-btn{
  display:inline-flex; align-items:center; justify-content: center; width: 36px; height: 36px; 
  font-size: 16px; border-radius: 50%; background:#FFF0F2; color:var(--color-heart); 
  border:1px solid #FFE4E6; cursor:pointer; font-weight:600; transition:.2s;
}
.fav-btn.active{background:var(--color-heart);color:#fff;border-color:var(--color-heart); box-shadow: 0 0 8px rgba(244, 63, 94, 0.3);}

/* Grid System */
.grid { padding: 24px 20px; display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:18px;}
.card {
  background:var(--color-card); border:1px solid var(--color-border);
  border-radius:var(--border-radius-lg); padding:1.25rem;
  cursor:pointer; transition:all .2s; position:relative;
}
.card:hover{ border-color:var(--color-border-hv); transform:translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
.card.sel { border: 2px solid var(--color-accent) !important; padding: calc(1.25rem - 1px); box-shadow: 0 8px 20px rgba(79, 70, 229, 0.08);}

.heart { position:absolute; top:16px; left:16px; font-size:22px; color:var(--color-border-hv); transition:all .2s; background:none; border:none; padding:0; cursor:pointer;}
.heart.fav{color:var(--color-heart);}
.heart:hover{transform:scale(1.1);}

.ctag{font-size:10px;font-weight:700;padding:4px 10px;border-radius:24px;display:inline-block;margin-bottom:12px;letter-spacing:0.3px;}
.cname{font-size:15px;font-weight:800;color:var(--color-text);line-height:1.4;margin-bottom:6px;padding-left: 20px;}
.csub{font-size:13px;color:var(--color-text-sec);line-height:1.6;}
.none{text-align:center;padding:4rem;color:var(--color-text-sec);font-size:15px;grid-column:1/-1;}

/* Overlay Backdrop */
.overlay {
  position: fixed; top: 0; right: 0; width: 100vw; height: 100vh;
  background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  z-index: 150; opacity: 0; visibility: hidden; transition: 0.3s ease;
}
.overlay.show { opacity: 1; visibility: visible; }

/* Side Drawer Styling */
.drawer {
  position: fixed; top: 0; left: -460px; /* sliding from left considering dir=rtl (Wait, RTL screen is from right side. so 'right: -460px')*/
  width: 100%; max-width: 420px; height: 100vh; background: var(--color-card);
  z-index: 200; transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 24px; overflow-y: auto; display:flex; flex-direction: column;
}
html[dir="rtl"] .drawer { left: auto; right: -460px; }
.drawer.open { right: 0 !important; }

.drawer-top { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 20px; }
.close-btn { background: #F1F5F9; border:none; width: 34px; height: 34px; border-radius:50%; font-size:18px; cursor:pointer; color: var(--color-text-sec); display:flex; align-items:center; justify-content:center; transition:.2s;}
.close-btn:hover { background: #E2E8F0; color: #000; transform: scale(1.05); }

.dt{font-size:22px;font-weight:800;color:var(--color-text);margin-bottom:12px; line-height: 1.4;}
.dd{font-size:14.5px;color:var(--color-text-sec);line-height:1.8;margin-bottom:24px; background: var(--color-bg); padding:16px; border-radius: var(--border-radius-lg); border:1px dashed var(--color-border);}
.dmeta{display:grid;grid-template-columns:1fr 1fr; gap:16px;margin-bottom:24px;}
.meta-box{border-right: 3px solid var(--color-accent); padding-right:12px; background:none; border-radius:0; border: none; padding-left: 0; border-right: 3px solid var(--color-accent); padding:0 12px 0 0;}
.dml{font-size:11px;color:var(--color-text-mut);font-weight:700;margin-bottom:6px;}
.dmv{font-size:13px;font-weight:700;color:var(--color-text);}

.dscore{display:grid;gap:12px; border-top:1px dashed var(--color-border); padding-top:20px; margin-bottom:auto; padding-bottom:30px;}
.dsc{display:flex; justify-content: space-between; align-items: center;}
.dsc-lbl{font-size:12px;color:var(--color-text-sec);font-weight:600;}
.dsc-bar{display:flex;gap:4px; width: 120px; direction: ltr; justify-content: flex-end;}
.dsc-seg{width:20px;height:6px;border-radius:4px;background:var(--color-border)}
.dsc-seg.f{background:#4F46E5}

.dbtn{background:var(--color-accent);color:#fff;border:none;border-radius:var(--border-radius-md);padding:14px;font-size:14px;font-weight:700;cursor:pointer;width:100%;text-align:center;transition:.2s;box-shadow:0 4px 6px rgba(79, 70, 229, 0.2); position:sticky; bottom: 0; left:0; z-index: 10; transform: translateY(-5px);}
.dbtn:hover{background:#4338CA;}

@media (max-width: 600px) {
  .header-wrap { flex-direction: column; align-items: stretch; }
  .filters-left { order: 2; width: 100%;}
  .filters-right { order: 1; width: 100%; display:grid; grid-template-columns: 1fr 1fr auto; gap: 8px;}
  html[dir="rtl"] .drawer { width:100%; right:-100%; border-radius: 0;}
}
</style>
</head>
<body>

<div class="header-wrap">
  <div class="filters-left">
    <input type="search" id="q" placeholder="جستجوی نیاز، تکنیک و ابزار..." oninput="render()">
    <span class="cnt" id="cnt"></span>
  </div>
  
  <div class="filters-right">
    <select id="catSelect" class="form-select" onchange="setCat(this.value)">
      <option value="">دسته بندی پورتفولیو</option>
      <option value="ui">استعدادهای بصری / UI Creator</option>
      <option value="prompt">ابزار تست مهندسی پرامپت</option>
      <option value="trans">ترجمه‌های مصور تخصصی</option>
      <option value="arch">دستیارهای بصری معماری</option>
      <option value="rehab">محصولات UX دار برای مددیاران</option>
      <option value="dash">پنل و داشبوردهای استارتاپی</option>
    </select>
    
    <select id="sortSelect" class="form-select" onchange="setSort(this.value)">
      <option value="null">اولویت خاصی نیست</option>
      <option value="skill">عالی برای نمایش به استخدام‌کننده UI</option>
    </select>
    
    <button id="btnFavShow" class="fav-btn" onclick="toggleFavShow()" title="موارد نشان‌کرده">♡</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- Overlay Background for Modal Effect -->
<div class="overlay" id="overlay" onclick="closeDet()"></div>

<!-- Floating Side Drawer Panel -->
<div class="drawer" id="drawer">
  <div class="drawer-top">
    <button class="close-btn" onclick="closeDet()">✕</button>
  </div>
  
  <div class="dt" id="dt"></div>
  <div class="dd" id="dd"></div>
  
  <div class="dmeta">
    <div class="meta-box"><div class="dml">اسلحه فرانت‌اند (Vibe Stack)</div><div class="dmv" id="ds" style="color:var(--color-accent)"></div></div>
    <div class="meta-box"><div class="dml">جذابیت برای شرکت‌های حوزه</div><div class="dmv" id="dinc"></div></div>
  </div>

  <div class="dscore">
    <div class="dsc">
      <div class="dsc-lbl">شانس قبولی شما در جلسه (نمایش UI/UX)</div>
      <div class="dsc-bar" id="d-skill-bar"></div>
    </div>
    <div class="dsc">
      <div class="dsc-lbl">پیچیدگی فنی کمتر بک‌اند (مناسب Vibe Code)</div>
      <div class="dsc-bar" id="d-vibe-bar"></div>
    </div>
  </div>
  
  <button class="dbtn" id="dbtn">🚀 پرامپت استارتر این را به من بده</button>
</div>


<script>
// Array representing exactly 73 distinct Front-End, App/SaaS focused concepts that show UX and Logic, skipping headless bots.
const cats={
  ui:   {id:"ui",label:"استعداد UI/وب‌اپ",bg:"#C0392B",lbg:"#F9EBEA",lc:"#922B21"},
  prompt: {id:"prompt",label:"لابراتوار پرامپت / مهندسی",bg:"#D35400",lbg:"#FDF2E9",lc:"#A04000"},
  trans:  {id:"trans",label:"استایلینگ و ترجمه اسناد",bg:"#008080",lbg:"#E0F2F1",lc:"#004D40"},
  rehab:  {id:"rehab",label:"تجارب تعاملی کاردرمانی",bg:"#E91E63",lbg:"#FCE4EC",lc:"#880E4F"},
  arch:   {id:"arch",label:"استودیو تعاملی معماری",bg:"#2980B9",lbg:"#EAF2F8",lc:"#1F618D"},
  dash:   {id:"dash",label:"داشبورد ساز مدیریتی",bg:"#27AE60",lbg:"#EAFAF1",lc:"#1D8348"},
};

const D=[
  /* Category UI & Visual Web App Tools - Showing UI muscles to recruiters */
  {id:1, cat:"ui", n:"سازنده تایم‌لاین فازی جذاب (AI Gantt Editor)", s:"طراحی گانت‌چارت خودکار بسیار تمیز از توصیف متنی.", d:"پلتفرمی که کاربر تایپ می‌کند: «من یک پروژه سه ماهه دکور مغازه دارم». اپلیکیشن از آن یک Gantt chart زیبا در React و فازهای پوینت‌گذاری شده روی تایم‌لاین بصری می‌سازد. بشدت چشم کارفرما را می‌گیرد.", stk:"React.js + AI Logic + Drag Drop", inc:"SaaS و رزومه کاریزما دار", sk:5, vib:5},
  {id:2, cat:"ui", n:"سازنده مود‌بورد هنری زنده (AI Mood Canvas)", s:"تغییر کلمات حسی و الهام‌بخش به چیدمان کولاژی", d:"برخلاف تولیدعکس ساده. این ابزار بوم نامحدودی میسازد(Canvas) که هوش پالت‌رنگی را مابینِ تصاویر کنار هم میتند. برای نمایش ذهن بصری خود در زمان استخدام محشر است.", stk:"Canvas HTML5 + API Image AI", inc:"ابزار مارکتینگ برندینگ شخصی", sk:5, vib:4},
  {id:3, cat:"ui", n:"ژنراتور سایتِ یک کلمه‌ای", s:"بخشنده Landing Page بر پایه Vibe Coding اتومات", d:"مدیر استخدام می‌بیند که پرامپتی طراحی کرده‌اید که تنها اسم محصول در سایت را گرفته و Header، Featuresها و دکمه را دقیقاً با Tailwind و با یک طرح UI خلوت رندر می‌کند.", stk:"HTML Template Engine AI", inc:"جذب سرمایه آژانس دیجیتال", sk:5, vib:5},
  {id:4, cat:"ui", n:"منتقد بی‌رحم UX/رابط بصری سایت‌ها", s:"ممیزی دسترسی‌پذیری و هارمونی روی Canvas آپلود", d:"استخدام کننده به یک طراح که از AI برای نقد کار خودش کمک میگیرد احترام می‌گذارد! این بوم با ویژن اسکرین‌شاتِ آپلود شده را آنالیز میکنه و اشکالات Contrast یا Flow را Highlight می‌اندازد روی عکس.", stk:"Claude Vision AI + Overlay bounding boxes", inc:"نمونه کار کلاس ارشد به آژانس‌ها", sk:5, vib:3},
  {id:5, cat:"ui", n:"مبدلِ گفتگویی به فرم‌های مینیمالِ انیمیت", s:"Typeform مدرن + مکالمه به جای جعبه‌های کسل‌کننده", d:"با کدزنی‌ویژوال؛ یک سرویس پر از Transition خلق کنید که اطلاعات مصاحبه یا Lead را به جای جدول پرسش، به زیبایی یکی پس از دیگری با کاربر مکالمه‌ی UI کند.", stk:"React Framer Motion + Prompt State", inc:"محصولی در آژانس مارکتینگ ترکیه", sk:5, vib:4},
  {id:6, cat:"ui", n:"سازنده دیزاین سیستم هوشمند(AI Branding Kit)", s:"از یک تصویر برند/لوگو، تمام اجزای Front را استایل کن", d:"شما برای تیم برنامه نویسی رزومه می‌فرستید: چه ابزاری بهتر از نرم‌افزاری که به شرکت بگوید با AI یک دکمه یا لوگو بدهند، تا تمامی State ها CSS / primary colors را زنده جنریت کند؟", stk:"CSS / React Tailwind Configurator", inc:"استخدام به‌عنوان UI/UX System", sk:5, vib:5},
  {id:7, cat:"ui", n:"ادیتورِ میکرِوکپی تعاملی رابط‌کاربری", s:"تست کپی‌رایت دکمه‌ها و فرم‌ها درون موبایل سایز شبیه‌ساز", d:"ایده خارق‌العاده رزومه‌ای. ابزار شامل کادر دمو دکمه روی UI که با کلیک، پرامپت نوشته‌های متفاوتی مناسب لحن بومی ترک با استفاده از Claude پیشنهاد می‌دهد و روی همان دکمه درجا رندر میکند تا ببیند خوب می‌شود یا نه.", stk:"Interactive Preview Engine", inc:"نشان دادن دانش ترکیبات میکروکپی‌ها", sk:5, vib:5},
  {id:8, cat:"ui", n:"صفحه ارایه‌پذیر کاتالوگ دینامیک شرکت(AI-Docx)", s:"دیتاهای سرد/اکسل رو میگیرد یک سند بروشور مانند رندر میکند", d:"بدون PDF، شما صفحه وب مجله مانند به ارمغان میارید تا منوی رستوران و فایرفریم طلا فروشان رو زیباتر بصری از هوش‌تحویل میگیرد.", stk:"Vibe Html templating", inc:"نمونه رزومه ابزارهای نمایش داده", sk:4, vib:4},
  
  /* Dashboards and visual processors (Former Data, heavily pushed toward front-end logic) */
  {id:9, cat:"dash", n:"ویژوالایزر بصری پیشبینی کمبودها (Flow board)", s:"داشبورد نمودارگر خلوت بجای داشبوردهای پر جزئیات فروش", d:"چون بک‌اند ندارید تمرکز کنید یک پنل UI که ChartJs یا ApexChart های به غایت مدرن دارد با دیتای دمویِ محاسبه شده در پرامپت تولید می‌کنید تا نشون بدی داشبورد رو میشه زیباتر ساخت.", stk:"JS Dash + Vibe code graph rendering", inc:"ورود به شرکت مالی به عنوان طراح UI پنل", sk:5, vib:5},
  {id:10, cat:"dash", n:"بوم احساسات محصول (Sentient Analyzer Dash)", s:"گرفتن Review کاربران ترکیه/GoogleMap -> تبدیل به گراف‌های هنری رنگارنگ", d:"برداشت احساس از یک کامنت ترکی. داشبورد نظرات سبز،زرد،قرمز با کارت های نرم Shadowed به عنوان یک UI که درد برند رو خیلی راحت نشان مدیر میده.", stk:"Text Embedding + D3js Layout", inc:"دغدغه اصلی مالکین محصولات مدرن", sk:4, vib:4},
  {id:11, cat:"dash", n:"تخته فرماندهی شفاف موسسات مالی - Impact Panel", s:"نشان‌گر خروجیِ عددی در اشکال آیکن‌ها به افراد عوام.", d:"هم در موسسات اعتباری هم برای NGO‌ها؛ وقتی میخواهند عدد بزرگ و نامفهومی را نمایش دهند هوش‌ به عنوان یک ویجت تبدیل کننده اعداد سنگین به داستان/آیکن‌های گرافیکی ساده (Infoxgraphic ساز آنی) انجام وظیفه میکند.", stk:"SVG dynamic generated charts AI", inc:"جذب در دپارتمان دیزاین مالی", sk:5, vib:5},
  {id:12, cat:"dash", n:"مانیتورینگ رقیبان؛ نه با جدول، بلکه با Widget! ", s:"ویجت های مقایسه UI که هوش‌تحلیلش رو تولید کرده.", d:"وقتی مدیر لاگین میشه جای یک فایل اکسلی مقایسه رقباش، با یک صفحه دارای 3 کارت زیبا شامل آیکن افت قیمت رقیب یا تغییر رنگ برندها رقیب مواجه می‌شود. نشانگر استعداد تبدیل دیتای پیچیده به نمای چشم‌نواز", stk:"UI logic Prompt structuring", inc:"رزومه‌ی عالی Product Design", sk:5, vib:4},
  {id:13, cat:"dash", n:"فایل کُده خوان (Visual Invoice Builder)", s:"اپ پردازش اسناد بی‌قاعده مالی", d:"طراحی یک صفحه دو-لنگه که سمت چپ فرم سند حسابداری در یک آی‌فریم وجود دارد سمت راست کادر گرافیکی با قابلیت Editable روی بخش‌های خوانده شده فرمول‌نویسی است.", stk:"Split-screen JS Editor", inc:"حسابداران بزرگ بازار میخرند", sk:4, vib:4},
  {id:14, cat:"dash", n:"پنل ادمین بدون ساختار", s:"سازنده داینامیک فرم ها(Admin CMS UI Configurator)", d:"ساختن پنل داشبوردی که کاربر با وارد کردن یک متن مانند یک جادوی AI تمام Sidebar و جداول CRUD در تم آن با متریال مینیمالیست رندر میشود.", stk:"UI Config Generation Script", inc:"عالی برای رزومه مهندسی ویجت‌ها", sk:5, vib:5},

  let list = D.filter(d => {
    if(showFavsOnly && !favs.has(d.id)) return false;
    if(cFilter && d.cat !== cFilter) return false;
    if(q && !d.n.toLowerCase().includes(q) && !d.s.toLowerCase().includes(q)) return false;
    return true;
  });
  
  if(sSort === "skill") list.sort((a,b)=>b.sk - a.sk);
  // Just show highest vibes
  if(sSort === "vibe") list.sort((a,b)=>b.vib - a.vib);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("cnt").textContent = `${list.length} / 73 ایده فیلترشده`;
  
  if(!list.length){
     grid.innerHTML = `<div class="none">ابزاری یافت نشد، کلمه را عوض کرده یا تنظیمات فیلتر را بردارید.</div>`;
     return;
  }
  
  list.forEach(d => {
    const c = cats[d.cat] || cats["ui"];
    const isFav = favs.has(d.id);
    const div = document.createElement("div");
    div.className = "card";
    
    div.innerHTML = `
      <button class="heart ${isFav?'fav':''}" onclick="toggleFav(${d.id}, event)" title="${isFav?'حذف':'افزودن نشان'}">${isFav?'♥':'♡'}</button>
      <div style="padding-left:14px; margin-top:28px;">
         <span class="ctag" style="background:${c.lbg};color:${c.lc}">${c.label}</span>
         <div class="cname">${d.n}</div>
         <div class="csub">${d.s}</div>
      </div>
    `;
    div.onclick = () => selectId(d.id, div);
    grid.appendChild(div);
  });
}

render();
</script>
</body>
</html>
