      function loadXMLFile(file) {
        const reader = new FileReader();
        reader.onload = e => initDictionary(e.target.result);
        reader.readAsText(file);
      }

      function initDictionary(xmlString) {
        const san = sanitizeXML(xmlString);
        showWarning(san);
        let workingXML = san.sanitized;
        const parser = new DOMParser();
        let doc = parser.parseFromString(workingXML, 'text/xml');
        let errEl = doc.querySelector('parsererror');
        if (errEl && /extra content|junk after/i.test(errEl.textContent)) {
          workingXML = `<items>${workingXML}</items>`;
          doc = parser.parseFromString(workingXML, 'text/xml');
          errEl = doc.querySelector('parsererror');
        }
        if (errEl) {
          const errText = errEl.textContent;
          const lineMatch = errText.match(/line\s*(\d+)/i),
            colMatch = errText.match(/column\s*(\d+)/i);
          let lineInfo = '',
            probLine = '';
          if (lineMatch) lineInfo += `Line: ${lineMatch[1]}`;
          if (colMatch) lineInfo += `, Column: ${colMatch[1]}`;
          if (lineMatch) {
            const lines = workingXML.split('\n');
            const ln = parseInt(lineMatch[1]) - 1;
            if (ln >= 0 && ln < lines.length) probLine = lines[ln].trim();
          }
          showError({
            error: errText, lineInfo, problematicLine: probLine,
            suggestion: 'Check XML structure.'
          });
          return;
        }
        hideError();
        hideWarning();
        dictionaryEntries = parseXML(workingXML);
        if (!dictionaryEntries.length) {
          cardsContainer.innerHTML = '<div class="no-results"><span class="emoji">⚠️</span>Failed to parse entries</div>';
          return;
        }
        buildIndex(dictionaryEntries);
        buildTxFilterBar();
        localStorage.setItem('eckopedia_data', xmlString);
        loadingIndicator.style.display = 'none';
        handleSearch();
      }

      function showError(v) {
        errorBanner.style.display = 'block';
        let h = '<div class="banner-title">❌ XML Parse Error</div>';
        h += `<p>${escapeHTML(v.error)}</p>`;
        if (v.lineInfo) h += `<p><strong>${v.lineInfo}</strong></p>`;
        if (v.problematicLine) h += `<div class="error-details">${escapeHTML(v.problematicLine)}</div>`;
        if (v.suggestion) h += `<p>💡 ${escapeHTML(v.suggestion)}</p>`;
        errorBanner.innerHTML = h;
      }

      function hideError() { errorBanner.style.display = 'none'; }

      function showWarning(san) {
        if (!san.fixedCount) { warningBanner.style.display = 'none'; return; }
        warningBanner.style.display = 'block';
        let h = '<div class="banner-title">⚠️ Auto‑fixed ampersands</div>';
        h += `<p>Fixed ${san.fixedCount} unescaped &amp;.</p>`;
        h += '<div class="warning-details">' + san.fixes.map(f =>
          `Line ${f.line}: ${escapeHTML(f.context)}`).join('<br>') + '</div>';
        warningBanner.innerHTML = h;
      }

      function hideWarning() { warningBanner.style.display = 'none'; }

      randomBtn.addEventListener('click', () => {
        if (!dictionaryEntries.length) return;
        const randomEntry = dictionaryEntries[Math.floor(Math.random() * dictionaryEntries.length)];
        window.ECKopedia.search(randomEntry.hw);
      });

      document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'k') { e.preventDefault(); searchInput.focus(); searchInput.select(); }
        if (e.key === 'Escape') { hideModal(); hideSettings(); hidePopover(); searchInput.blur(); }
        if (e.key === 'Enter' && document.activeElement === searchInput) {
          saveSearchToHistory();
          searchInput.blur();
        }
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
          if (document.activeElement === searchInput) {
            e.preventDefault();
            const cards = [...cardsContainer.querySelectorAll('.card')];
            if (!cards.length) return;
            const curIdx = cards.findIndex(c => c.classList.contains('highlight'));
            let next = 0;
            if (e.key === 'ArrowDown') next = curIdx < 0 ? 0 : Math.min(curIdx + 1, cards.length - 1);
            else next = curIdx <= 0 ? cards.length - 1 : curIdx - 1;
            cards.forEach(c => c.classList.remove('highlight'));
            cards[next].classList.add('highlight');
            cards[next].scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      });

      document.getElementById('fontDown').addEventListener('click', () => {
        appSettings.fontScale = Math.max(0.75, +(appSettings.fontScale - 0.05).toFixed(2));
        saveSettings();
        handleSearch();
      });
      document.getElementById('fontUp').addEventListener('click', () => {
        appSettings.fontScale = Math.min(1.40, +(appSettings.fontScale + 0.05).toFixed(2));
        saveSettings();
        handleSearch();
      });
      document.getElementById('fontReset').addEventListener('click', () => {
        appSettings.fontScale = 1.0;
        saveSettings();
        handleSearch();
      });
      document.getElementById('togglePron').addEventListener('change', function () {
        appSettings.showPron = this.checked;
        saveSettings();
        handleSearch();
      });
      document.getElementById('toggleTr').addEventListener('change', function () {
        appSettings.showTr = this.checked;
        saveSettings();
        handleSearch();
      });
      document.getElementById('toggleTx').addEventListener('change', function () {
        appSettings.showTx = this.checked;
        saveSettings();
        handleSearch();
      });
      document.getElementById('toggleAppendix').addEventListener('change', function () {
        appSettings.showAppendix = this.checked;
        saveSettings();
        handleSearch();
      });
      document.getElementById('toggleSections').addEventListener('change', function () {
        appSettings.showSections = this.checked;
        saveSettings();
        handleSearch();
      });
      document.getElementById('toggleTheme').addEventListener('change', function () {
        appSettings.theme = this.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', appSettings.theme);
        saveSettings();
      });

      // Setup Infinite Scroll Observer
      (function initInfiniteScroll() {
        const sentinel = document.createElement('div');
        sentinel.id = 'infiniteSentinel';
        sentinel.style.height = '20px';
        sentinel.style.margin = '20px 0';
        cardsContainer.after(sentinel);

        infiniteObserver = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && currentEntries.length > visibleCount) {
            renderNextBatch();
          }
        }, { rootMargin: '500px' }); // Load more when 500px away
        infiniteObserver.observe(sentinel);
      })();

      loadSettings();
      const savedData = localStorage.getItem('eckopedia_data');
      if (savedData) {
        initDictionary(savedData);
      } else {
        initDictionary(defaultXML);
      }

    })();
  </script>
</body>

</html>
