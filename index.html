<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتفولیو سه بعدی من | HuAliAsu</title>
    
    <!-- استایل‌های ظاهری سایت -->
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            text-align: center; 
            margin: 0; 
            padding: 40px 20px; 
        }
        .container { 
            max-width: 900px; 
            margin: auto; 
        }
        h1 { color: #64ffda; margin-bottom: 40px; }
        .model-box { 
            background: #1e1e1e; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 40px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            border: 1px solid #333;
        }
        .model-box h2 { color: #ffffff; font-size: 1.2rem; }
        .model-box p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        
        /* استایل مربوط به نمایش‌دهنده GLB */
        model-viewer { 
            width: 100%; 
            height: 450px; 
            background-color: #2a2a2a;
            border-radius: 8px;
            outline: none; 
        }
        
        /* استایل مربوط به بوم نمایش Three.js (برای STL) */
        #stl-container { 
            width: 100%; 
            height: 450px; 
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }
    </style>

    <!-- فراخوانی ابزار Model-Viewer گوگل برای فایل‌های GLB -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>نمونه کارهای طراحی سه بعدی</h1>
        
        <!-- بخش اول: فایل GLB (با قابلیت چرخش و زوم خودکار) -->
        <div class="model-box">
            <h2>مدل تکمیلی</h2>
            <p>فرمت: GLB | قابلیت تعامل کامل</p>
            <model-viewer 
                src="Silla - d Takmil.stl.glb" 
                alt="Silla Takmil 3D Model"
                auto-rotate 
                camera-controls 
                shadow-intensity="1"
                environment-image="neutral">
            </model-viewer>
        </div>

        <!-- بخش دوم: فایل STL (رندر شده توسط Three.js) -->
        <div class="model-box">
            <h2>مدل پایه (نسخه ۶-۱۵ E)</h2>
            <p>فرمت: STL | رندر اختصاصی Three.js</p>
            <div id="stl-container"></div>
        </div>
    </div>

    <!-- کدهای Three.js برای لود و رندر فایل STL -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // تنظیمات صحنه (Scene)
        const container = document.getElementById('stl-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a);

        // تنظیمات دوربین (Camera)
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(50, 50, 50); // جایگاه دوربین

        // رندر کننده (Renderer)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // نورپردازی
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);

        // کنترل‌های موس (برای زوم و چرخش)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // بارگذاری فایل STL
        const loader = new STLLoader();
        loader.load('Silla6-15 E.stl', function (geometry) {
            // ساخت متریال (جنس بدنه مدل)
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x64ffda, // رنگ سبز مینیمال
                metalness: 0.3, 
                roughness: 0.4 
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            // مرکزیت دادن به مدل به صورت خودکار
            geometry.computeBoundingBox();
            const boundingBox = geometry.boundingBox;
            const center = new THREE.Vector3();
            boundingBox.getCenter(center);
            mesh.position.sub(center); // انتقال مدل به نقطه 0,0,0
            
            // اضافه کردن به صحنه
            const wrapper = new THREE.Object3D();
            wrapper.add(mesh);
            
            // چرخش اولیه مدل (در صورت نیاز می‌توانید تغییر دهید)
            wrapper.rotation.x = -Math.PI / 2;
            
            scene.add(wrapper);
            
            // تنظیم خودکار دوربین بر اساس ابعاد مدل
            const size = new THREE.Vector3();
            boundingBox.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.z = maxDim * 2;
            camera.position.y = maxDim * 1.5;
            camera.position.x = maxDim * 1.5;
            
        }, undefined, function (error) {
            console.error('خطا در لود فایل STL:', error);
            container.innerHTML = '<p style="color:red; margin-top:50px;">فایل STL یافت نشد. مطمئن شوید نام فایل دقیقاً Silla6-15 E.stl است و در گیت‌هاب آپلود شده است.</p>';
        });

        // حلقه انیمیشن
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // واکنش‌گرایی: تغییر سایز بوم هنگام کوچک کردن صفحه مرورگر
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }, false);
    </script>
</body>
</html>
